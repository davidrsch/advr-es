project:
  type: book
  output-dir: docs

book:
  title: "R Avanzado"
  reader-mode: true
  site-url: https://davidrsch.github.io/advr-es/
  description: |
    Traducción al español de "Advanced R" de Hadley Wickham. Profundiza en el
    lenguaje R, dominando programación funcional, orientada a objetos,
    metaprogramación, rendimiento y más.
  open-graph: true

  page-footer:
    left: |
      <b>"R Avanzado"</b> fue escrito por Hadley Wickham.
    right: |
      Este libro fue creado usando <a href="https://quarto.org/">Quarto</a>.
  cover-image: cover.png
  favicon: projectlogo.png

  author:
    - name: Hadley Wickham
  search: true
  downloads: [pdf]
  sidebar:
    pinned: true
    tools:
      - icon: github
        menu:
          - text: Original
            url: https://github.com/hadley/adv-r
          - text: Traducción
            url: https://github.com/davidrsch/advr-es
  page-navigation: true
  chapters:
    - index.qmd
    - Preface.qmd
    - Introduction.qmd
    - part: "Fundamentos"
      chapters:
        - Foundations.qmd
        - Names-values.qmd
        - Vectors.qmd
        - Subsetting.qmd
        - Control-flow.qmd
        - Functions.qmd
        - Environments.qmd
        - Conditions.qmd
    - part: "Programación funcional"
      chapters:
        - FP.qmd
        - Functionals.qmd
        - Function-factories.qmd
        - Function-operators.qmd
    - part: "Programación orientada a objetos"
      chapters:
        - OO.qmd
        - base-types.qmd
        - S3.qmd
        - R6.qmd
        - S4.qmd
        - OO-tradeoffs.qmd
    - part: "Metaprogramación"
      chapters:
        - Meta.qmd
        - Big-picture.qmd
        - Expressions.qmd
        - Quotation.qmd
        - Evaluation.qmd
        - Translation.qmd
    - part: "Tecnicas"
      chapters:
        - Techniques.qmd
        - Debugging.qmd
        - Perf-measure.qmd
        - Perf-improve.qmd
        - Rcpp.qmd
    - References.qmd

bibliography: book.bib

lang: es

format:
  html:
    include-after-body: [ddrsch_script.html]
    include-in-header: [ddrsch_script_header.html]
    css: adv-r.css

  pdf:
    documentclass: scrbook
    include_in_header: latex/preamble.tex
    include_before_body: latex/before_body.tex
    include_after_body: latex/after_body.tex
    keep_tex: true
    dev: "cairo_pdf"
    latex_engine: xelatex
    citation_package: natbib
    pandoc_args: ["--top-level-division=chapter", "--lua-filter=latex/sidebar.lua"]
    theme: null
    quote_footer: ["\\hspace*{\\fill} ", ""]
    toc_unnumbered: false
    number_sections: true

editor: visual

